<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Gestão do Portal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        .admin-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-top: 20px;
        }
        .log-box { 
            background: #000; 
            padding: 15px; 
            height: 400px; 
            overflow-y: auto; 
            font-family: 'JetBrains Mono', monospace; 
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 13px;
        }
        .log-entry { 
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            line-height: 1.4;
        }
        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .badge-owner { background: rgba(0, 198, 255, 0.2); color: var(--accent); }
        .badge-user { background: rgba(255, 255, 255, 0.1); color: #aaa; }
        
        @media (max-width: 900px) {
            .admin-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="left-group">
            <a href="index.html" style="color: white; text-decoration: none; display: flex; align-items: center; gap: 8px;">
                <span class="material-icons">arrow_back</span> 
                <span style="font-weight: 600;">Voltar</span>
            </a>
        </div>
        <div style="color: #ff4444; font-weight: bold; letter-spacing: 1px;">
            PAINEL DE ADMINISTRAÇÃO
        </div>
    </div>

    <div class="notes-container animate-pop">
        <div class="admin-grid">
            <div class="card">
                <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 20px;">
                    <span class="material-icons" style="color: var(--accent);">group</span>
                    <h3 style="margin:0;">Utilizadores Registados</h3>
                </div>
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>Email</th>
                                <th>Cargo</th>
                                <th>Estado/Ação</th>
                            </tr>
                        </thead>
                        <tbody id="userTable">
                            </tbody>
                    </table>
                </div>
            </div>

            <div class="card">
                <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 20px;">
                    <span class="material-icons" style="color: #ffcc00;">history</span>
                    <h3 style="margin:0;">Logs de Atividade</h3>
                </div>
                <div id="logBox" class="log-box">A carregar logs...</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { collection, getDocs, doc, getDoc, updateDoc, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 1. Security Redirect (Server-side simulation)
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const u = await getDoc(doc(db, "users", user.uid));
                if (!u.exists() || u.data().role !== 'owner') {
                    window.location.href = "index.html";
                } else {
                    loadAdminContent();
                }
            } else {
                window.location.href = "login.html";
            }
        });

        async function loadAdminContent() {
            // Load Logs
            const logQuery = query(collection(db, "logs"), orderBy("time", "desc"), limit(50));
            const logsSnap = await getDocs(logQuery);
            const logBox = document.getElementById('logBox');
            logBox.innerHTML = '';
            
            logsSnap.forEach(d => {
                const l = d.data();
                const entry = document.createElement('div');
                entry.className = 'log-entry';
                entry.innerHTML = `<span style="color:var(--accent)">[${l.time}]</span> <strong>${l.user}</strong>: ${l.action}`;
                logBox.appendChild(entry);
            });

            // Load Users
            const usersSnap = await getDocs(collection(db, "users"));
            const userTable = document.getElementById('userTable');
            userTable.innerHTML = '';

            usersSnap.forEach(d => {
                const u = d.data();
                const tr = document.createElement('tr');
                
                // Email Cell
                const tdEmail = document.createElement('td');
                tdEmail.textContent = u.email; // XSS Protection
                
                // Role Cell
                const tdRole = document.createElement('td');
                const roleBadge = document.createElement('span');
                roleBadge.className = `status-badge badge-${u.role}`;
                roleBadge.textContent = u.role;
                tdRole.appendChild(roleBadge);

                // Action Cell
                const tdAction = document.createElement('td');
                const banBtn = document.createElement('button');
                banBtn.textContent = u.isBanned ? 'DESBANIR' : 'BANIR';
                banBtn.style.color = u.isBanned ? '#00ff88' : '#ff4444';
                banBtn.style.background = 'none';
                banBtn.style.border = 'none';
                banBtn.style.cursor = 'pointer';
                banBtn.style.fontWeight = 'bold';
                
                banBtn.onclick = async () => {
                    if(confirm(`Deseja alterar o estado de ${u.email}?`)) {
                        await updateDoc(doc(db, "users", d.id), { isBanned: !u.isBanned });
                        loadAdminContent(); // Refresh
                    }
                };

                tdAction.appendChild(banBtn);
                tr.append(tdEmail, tdRole, tdAction);
                userTable.appendChild(tr);
            });
        }
    </script>
</body>
</html>
