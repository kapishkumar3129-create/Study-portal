<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizar Módulo - Portal TGPSI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        .module-content {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            margin-top: 20px;
            line-height: 1.8;
            color: #e0e0e0;
        }
        /* Style for content uploaded via Admin */
        .module-content h1, .module-content h2 { color: var(--accent); margin-top: 30px; }
        .module-content code { background: #000; padding: 2px 6px; border-radius: 4px; color: #00ff88; }
        .module-content pre { background: #000; padding: 15px; border-radius: 8px; overflow-x: auto; }
        .module-content img { max-width: 100%; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="left-group">
            <a href="index.html" style="color: white; text-decoration: none; display: flex; align-items: center; gap: 8px;">
                <span class="material-icons">arrow_back</span> 
                <span style="font-weight: 600;">Voltar ao Dashboard</span>
            </a>
        </div>
        <div id="moduleTitle" style="font-weight: bold; color: var(--accent); text-transform: uppercase;">Módulo</div>
    </div>

    <div class="notes-container animate-pop">
        <div id="loader" style="text-align: center; padding: 50px;">
            <span class="material-icons" style="font-size: 48px; color: var(--accent);">sync</span>
            <p>A carregar conteúdo...</p>
        </div>

        <div id="contentWrapper" style="display: none;">
            <header style="margin-bottom: 20px;">
                <h1 id="mainTitle" style="margin: 0;"></h1>
                <p id="moduleDescription" style="color: var(--text-secondary);"></p>
            </header>

            <div class="module-content" id="renderArea">
                </div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Auth Check
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "login.html";
                return;
            }

            // Get Module ID from URL (?id=M01)
            const params = new URLSearchParams(window.location.search);
            const moduleId = params.get('id');

            if (!moduleId) {
                window.location.href = "index.html";
                return;
            }

            try {
                const docRef = doc(db, "modules", moduleId);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    
                    document.getElementById('moduleTitle').innerText = moduleId;
                    document.getElementById('mainTitle').innerText = moduleId;
                    document.getElementById('moduleDescription').innerText = data.description || "";
                    document.getElementById('renderArea').innerHTML = data.content;

                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('contentWrapper').style.display = 'block';
                } else {
                    document.getElementById('loader').innerHTML = "<p>Módulo não encontrado.</p>";
                }
            } catch (e) {
                console.error(e);
                document.getElementById('loader').innerHTML = "<p>Erro ao carregar dados.</p>";
            }
        });
    </script>
</body>
</html>
